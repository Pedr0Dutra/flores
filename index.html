<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flores para ti 🌻</title>
    <style>
        :root {
            --bg-color: #F9F6ED; /* Cor creme/sepia suave idêntica ao vídeo */
            --text-color: #4A3B32;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            color: var(--text-color);
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* --- TEXTO INTEGRADO (Exatamente como no vídeo) --- */
        .text-container {
            position: absolute;
            top: 10%;
            left: 5%;
            z-index: 2;
            width: 90%;
            max-width: 450px;
            font-size: 1.1rem;
            line-height: 1.4;
            /* Sombras leves para garantir leitura sobre as flores futuramente */
            text-shadow: 2px 2px 4px rgba(249, 246, 237, 0.9);
        }
        @media (min-width: 768px) {
            .text-container { font-size: 1.3rem; top: 15%; left: 8%; }
        }
        .typewriter {
            min-height: 24px;
            margin-bottom: 12px;
        }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: var(--text-color);
            animation: blink 1s step-end infinite;
            vertical-align: bottom;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- CRONÓMETRO (Idêntico ao vídeo) --- */
        .timer-container {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            width: 90%;
            max-width: 400px;
            font-size: 0.9rem;
            background: rgba(249, 246, 237, 0.9);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            box-sizing: border-box;
            border: 2px solid var(--text-color);
            box-shadow: 0px 4px 6px rgba(0,0,0,0.1);
        }
        #timer {
            margin: 5px 0 0 0;
            font-weight: bold;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div id="container">
    <div class="text-container" id="text-container"></div>
    
    <canvas id="canvas"></canvas>

    <div class="timer-container">
        <strong>Meu amor por você começou há...</strong>
        <p id="timer">0 dias 0 horas 0 minutos 0 segundos</p>
    </div>
</div>

<script>
    // --- TEXTOS E DATA ---
    const phrases = [
        "Flores Amarelas para o amor da minha vida:",
        "Se eu pudesse escolher um lugar seguro, seria ao seu lado.",
        "Quanto mais tempo passa, vejo que meu amor por você só cresce.",
        "- Eu te amo! 🌻"
    ];
    
    // Data alterada para 31 de Agosto de 2025 
    const startDate = new Date(2025, 7, 31, 0, 0, 0); 

    // --- MÁQUINA DE ESCREVER ---
    const textContainer = document.getElementById('text-container');
    let phraseIndex = 0;
    let charIndex = 0;
    
    function typeWriter() {
        if (phraseIndex < phrases.length) {
            if (charIndex === 0) {
                const p = document.createElement('div');
                p.className = 'typewriter';
                p.id = `phrase-${phraseIndex}`;
                textContainer.appendChild(p);
            }
            const currentElement = document.getElementById(`phrase-${phraseIndex}`);
            if (charIndex < phrases[phraseIndex].length) {
                currentElement.innerHTML = phrases[phraseIndex].substring(0, charIndex + 1) + '<span class="cursor"></span>';
                charIndex++;
                setTimeout(typeWriter, 50); 
            } else {
                currentElement.innerHTML = phrases[phraseIndex];
                phraseIndex++;
                charIndex = 0;
                setTimeout(typeWriter, 1000); 
            }
        } else {
            const p = document.getElementById(`phrase-${phraseIndex - 1}`);
            if(p) p.innerHTML += '<span class="cursor"></span>';
        }
    }
    setTimeout(typeWriter, 1000);

    // --- CRONÓMETRO ---
    function updateTimer() {
        const now = new Date();
        const diff = now - startDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / 1000 / 60) % 60);
        const seconds = Math.floor((diff / 1000) % 60);
        document.getElementById('timer').innerText = `${days} dias ${hours} horas ${minutes} minutos ${seconds} segundos`;
    }
    setInterval(updateTimer, 1000);
    updateTimer();

    // --- ANIMAÇÃO DA ÁRVORE DE CORAÇÃO ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    // Flores Simples (Igual ao vídeo)
    function drawFlower(x, y, size) {
        // Miolo
        ctx.beginPath();
        ctx.arc(x, y, size * 0.8, 0, Math.PI * 2);
        ctx.fillStyle = '#63391d'; // Castanho
        ctx.fill();
        
        // Pétalas simples
        ctx.fillStyle = '#FFD700'; // Amarelo vibrante
        for (let i = 0; i < 6; i++) {
            const angle = (i * Math.PI * 2) / 6;
            ctx.beginPath();
            ctx.ellipse(
                x + Math.cos(angle) * size * 1.3, 
                y + Math.sin(angle) * size * 1.3, 
                size * 1.1, size * 0.6, angle, 0, Math.PI * 2
            );
            ctx.fill();
        }
    }

    // Equação Paramétrica do Coração Perfeito
    function getHeartPoint(t, scale, centerX, centerY) {
        const hX = 16 * Math.pow(Math.sin(t), 3);
        const hY = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        return { x: hX * scale + centerX, y: hY * scale + centerY };
    }

    function animateTree() {
        const centerX = width * 0.65;
        const bottomY = height * 0.8;
        const trunkHeight = height * 0.25;
        // Escala do coração baseada na largura da tela
        const heartScale = width > 768 ? 10 : 7.5; 
        
        // 1. Desenhar o tronco principal
        let currentHeight = 0;
        const drawTrunk = () => {
            if (currentHeight < trunkHeight) {
                ctx.beginPath();
                ctx.strokeStyle = '#4A3B32'; // Castanho escuro
                ctx.lineWidth = 12;
                ctx.lineCap = 'round';
                ctx.moveTo(centerX, bottomY);
                ctx.lineTo(centerX, bottomY - currentHeight);
                ctx.stroke();
                currentHeight += 4;
                requestAnimationFrame(drawTrunk);
            } else {
                drawHeartBranches();
            }
        };

        // 2. Desenhar os ramos que formam o contorno do coração
        const drawHeartBranches = () => {
            let t = 0;
            const step = 0.1;
            ctx.lineWidth = 6;
            ctx.strokeStyle = '#4A3B32';

            const drawContour = setInterval(() => {
                if (t <= Math.PI * 2) {
                    const startPoint = getHeartPoint(t, heartScale, centerX, bottomY - trunkHeight);
                    t += step;
                    const endPoint = getHeartPoint(t, heartScale, centerX, bottomY - trunkHeight);

                    // Desenha o segmento do ramo
                    ctx.beginPath();
                    ctx.moveTo(startPoint.x, startPoint.y);
                    ctx.lineTo(endPoint.x, endPoint.y);
                    ctx.stroke();
                } else {
                    clearInterval(drawContour);
                    popFlowersExplosion(); // Quando os ramos estão prontos, as flores explodem
                }
            }, 30);
        };

        // 3. Explosão de Flores Simples cobrindo o coração
        const popFlowersExplosion = () => {
            for (let i = 0; i < 250; i++) {
                setTimeout(() => {
                    const t = Math.random() * Math.PI * 2;
                    // Raiz quadrada do Math.random garante preenchimento denso no centro
                    const scaleFactor = Math.sqrt(Math.random()) * heartScale; 
                    const pt = getHeartPoint(t, scaleFactor, centerX, bottomY - trunkHeight);
                    
                    drawFlower(pt.x, pt.y, 3 + Math.random() * 3);
                }, i * 15); // Tempo para cada flor aparecer sequencialmente
            }
        }

        drawTrunk();
    }

    setTimeout(animateTree, 1500);
</script>
</body>
</html>
