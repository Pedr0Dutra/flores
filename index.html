<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores para você 🌻</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FAF3E0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            color: #4A3B32;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .text-container {
            position: absolute;
            top: 6%;
            left: 5%;
            z-index: 2;
            width: 90%;
            max-width: 400px;
            font-size: 1.1rem;
            line-height: 1.5;
            text-shadow: 2px 2px 4px rgba(250, 243, 224, 0.9); /* Protege o texto dos galhos */
        }
        @media (min-width: 768px) {
            .text-container { font-size: 1.4rem; top: 10%; }
            .timer-container { font-size: 1.2rem; }
        }
        .timer-container {
            position: absolute;
            bottom: 4%;
            left: 5%;
            z-index: 2;
            width: 90%;
            font-size: 0.9rem;
            background: rgba(250, 243, 224, 0.85);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            box-sizing: border-box;
            border-bottom: 3px solid #4A3B32;
        }
        .typewriter {
            min-height: 24px;
            margin-bottom: 12px;
        }
        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.2em;
            background-color: #4A3B32;
            animation: blink 1s step-end infinite;
            vertical-align: bottom;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="container">
    <div class="text-container" id="text-container"></div>
    
    <div class="timer-container">
        <strong>Meu amor por você começou há...</strong>
        <p id="timer" style="margin-top: 5px; margin-bottom: 0;">0 dias 0 horas 0 minutos 0 segundos</p>
    </div>

    <canvas id="canvas"></canvas>
</div>

<script>
    // --- TEXTOS E DATA ---
    const phrases = [
        "Flores Amarelas para o amor da minha vida:",
        "Se eu pudesse escolher um lugar seguro, seria ao seu lado.",
        "Quanto mais tempo passa, vejo que meu amor por você só cresce.",
        "- Eu te amo! 🌻"
    ];
    
    // 31 de Agosto de 2025
    const startDate = new Date(2025, 7, 31, 0, 0, 0); 

    // --- MÁQUINA DE ESCREVER ---
    const textContainer = document.getElementById('text-container');
    let phraseIndex = 0;
    let charIndex = 0;
    
    function typeWriter() {
        if (phraseIndex < phrases.length) {
            if (charIndex === 0) {
                const p = document.createElement('div');
                p.className = 'typewriter';
                p.id = `phrase-${phraseIndex}`;
                textContainer.appendChild(p);
            }
            const currentElement = document.getElementById(`phrase-${phraseIndex}`);
            if (charIndex < phrases[phraseIndex].length) {
                currentElement.innerHTML = phrases[phraseIndex].substring(0, charIndex + 1) + '<span class="cursor"></span>';
                charIndex++;
                setTimeout(typeWriter, 50); 
            } else {
                currentElement.innerHTML = phrases[phraseIndex];
                phraseIndex++;
                charIndex = 0;
                setTimeout(typeWriter, 1200); 
            }
        } else {
            const p = document.getElementById(`phrase-${phraseIndex - 1}`);
            if(p) p.innerHTML += '<span class="cursor"></span>';
        }
    }
    setTimeout(typeWriter, 800);

    // --- CONTADOR DE TEMPO ---
    function updateTimer() {
        const now = new Date();
        const diff = now - startDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / 1000 / 60) % 60);
        const seconds = Math.floor((diff / 1000) % 60);
        document.getElementById('timer').innerText = `${days} dias ${hours} horas ${minutes} minutos ${seconds} segundos`;
    }
    setInterval(updateTimer, 1000);
    updateTimer();

    // --- ANIMAÇÃO DA ÁRVORE (CORRIGIDA E CENTRALIZADA) ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    // Novo desenho de girassol (igual ao vídeo)
    function drawFlower(x, y) {
        // Pétalas ao redor
        for (let i = 0; i < 8; i++) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(i * (Math.PI * 2 / 8));
            ctx.beginPath();
            ctx.ellipse(0, -6, 3, 7, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#FFD700'; // Amarelo vibrante
            ctx.fill();
            ctx.restore();
        }
        // Miolo central
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#4a2c11'; // Marrom escuro
        ctx.fill();
    }

    // Árvore recursiva simétrica
    function drawTree(startX, startY, len, angle, branchWidth, depth) {
        ctx.beginPath();
        ctx.save();
        ctx.strokeStyle = '#3d2b1f'; // Cor do tronco
        ctx.lineCap = 'round';
        ctx.lineWidth = branchWidth;
        ctx.translate(startX, startY);
        ctx.rotate(angle * Math.PI / 180);
        
        ctx.moveTo(0, 0);
        ctx.lineTo(0, -len);
        ctx.stroke();

        // Limite de profundidade gerando a copa fechada
        if (depth < 8) { 
            setTimeout(() => {
                const newLen = len * 0.75;
                const newWidth = branchWidth * 0.7;
                
                // Bifurcação em V perfeita
                drawTree(0, -len, newLen, angle - 25, newWidth, depth + 1);
                drawTree(0, -len, newLen, angle + 25, newWidth, depth + 1);
                
                // Galhos extras centrais para encher o meio da copa
                if (depth > 4 && Math.random() > 0.4) {
                    drawTree(0, -len, newLen * 0.8, angle + (Math.random() * 10 - 5), newWidth, depth + 1);
                }
            }, 60); // Velocidade de crescimento
        } else {
            // Explosão de flores nas pontas quando os galhos terminam
            setTimeout(() => {
                drawFlower(0, -len);
                // Flores extras criando o aglomerado
                for(let i=0; i<3; i++){
                    setTimeout(() => {
                        drawFlower((Math.random() - 0.5) * 25, -len + (Math.random() - 0.5) * 25);
                    }, Math.random() * 200);
                }
            }, 100);
        }
        ctx.restore();
    }

    // Inicia a animação
    setTimeout(() => {
        // Trava o eixo X exatamente no meio da tela
        const treeX = width / 2; 
        // Desce a árvore para não sobrepor o texto no topo
        const treeY = height - (height * 0.15); 
        // Comprimento inicial calculado para a árvore não ficar gigante
        const initialBranchLength = height * 0.12; 
        
        drawTree(treeX, treeY, initialBranchLength, 0, 12, 0);
    }, 500);

</script>
</body>
</html>
