<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flores para você 🌻</title>
    <style>
        :root {
            /* Definindo a cor de fundo para consistência */
            --bg-color: #FAF3E0;
            --text-color: #4A3B32;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; /* Evita rolagens que quebram o layout */
            height: 100vh;
            color: var(--text-color);
            display: flex;
            flex-direction: column; /* Organiza em topo (texto) e fundo (canvas) */
        }
        
        /* --- ÁREA DE TEXTO (CABEÇALHO SEPARADO) --- */
        .header-text-area {
            width: 100%;
            background-color: var(--bg-color); /* Fundo sólido para garantir leitura */
            padding: 20px 5% 10px 5%; /* Espaçamento interno */
            box-sizing: border-box;
            z-index: 10; /* Mantém acima de qualquer elemento de fundo */
            border-bottom: 2px solid rgba(74, 59, 50, 0.1); /* Divisória sutil */
        }
        
        .text-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto; /* Centraliza o bloco de texto */
            font-size: 1.1rem;
            line-height: 1.5;
        }
        
        @media (min-width: 768px) {
            .text-container { font-size: 1.4rem; }
        }
        
        .typewriter {
            min-height: 1.2em;
            margin-bottom: 10px;
        }
        
        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.2em;
            background-color: var(--text-color);
            animation: blink 1s step-end infinite;
            vertical-align: bottom;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- ÁREA DA ANIMAÇÃO (CANVAS) --- */
        #canvas-container {
            flex-grow: 1; /* Ocupa todo o espaço restante abaixo do texto */
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        
        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* --- ÁREA DO TEMPO (FIXADA NA BASE DO CANVAS) --- */
        .timer-container {
            position: absolute;
            bottom: 4%;
            left: 50%;
            transform: translateX(-50%); /* Centralização perfeita */
            z-index: 2;
            width: 90%;
            max-width: 400px;
            font-size: 0.9rem;
            background: rgba(250, 243, 224, 0.95);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            box-sizing: border-box;
            border: 2px solid var(--text-color);
            box-shadow: 0px 4px 6px rgba(0,0,0,0.15);
        }
        
        #timer {
            margin: 5px 0 0 0;
            font-weight: bold;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="header-text-area">
        <div class="text-container" id="text-container"></div>
    </div>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
        
        <div class="timer-container">
            <strong>Meu amor por você começou há...</strong>
            <p id="timer">0 dias 0 horas 0 minutos 0 segundos</p>
        </div>
    </div>

<script>
    // --- TEXTOS E DATA ---
    const phrases = [
        "Flores Amarelas para o amor da minha vida:",
        "Si pudiera elegir un lugar seguro, sería a tu lado.",
        "Quanto mais tempo passa, vejo que meu amor por você só cresce.",
        "- Eu te amo! 🌻"
    ];
    
    // Data: 31 de Agosto de 2025
    const startDate = new Date(2025, 7, 31, 0, 0, 0); 

    // --- MÁQUINA DE ESCREVER ---
    const textContainer = document.getElementById('text-container');
    let phraseIndex = 0;
    let charIndex = 0;
    
    function typeWriter() {
        if (phraseIndex < phrases.length) {
            if (charIndex === 0) {
                const p = document.createElement('div');
                p.className = 'typewriter';
                p.id = `phrase-${phraseIndex}`;
                textContainer.appendChild(p);
            }
            const currentElement = document.getElementById(`phrase-${phraseIndex}`);
            if (charIndex < phrases[phraseIndex].length) {
                currentElement.innerHTML = phrases[phraseIndex].substring(0, charIndex + 1) + '<span class="cursor"></span>';
                charIndex++;
                setTimeout(typeWriter, 50); 
            } else {
                currentElement.innerHTML = phrases[phraseIndex];
                phraseIndex++;
                charIndex = 0;
                setTimeout(typeWriter, 1200); 
            }
        } else {
            const p = document.getElementById(`phrase-${phraseIndex - 1}`);
            if(p) p.innerHTML += '<span class="cursor"></span>';
        }
    }
    setTimeout(typeWriter, 800);

    // --- CONTADOR DE TEMPO ---
    function updateTimer() {
        const now = new Date();
        const diff = now - startDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / 1000 / 60) % 60);
        const seconds = Math.floor((diff / 1000) % 60);
        document.getElementById('timer').innerText = `${days} dias ${hours} horas ${minutes} minutos ${seconds} segundos`;
    }
    setInterval(updateTimer, 1000);
    updateTimer();

    // --- SETUP DO CANVAS NO CONTAINER ---
    const canvas = document.getElementById('canvas');
    const container = document.getElementById('canvas-container');
    const ctx = canvas.getContext('2d');
    
    // Ajusta o tamanho do canvas para o container, não a janela inteira
    function resizeCanvas() {
        canvas.width = container.offsetWidth;
        canvas.height = container.offsetHeight;
    }
    resizeCanvas();
    // Previne re-renderização no resize do iPhone (que acontece no scroll)
    window.addEventListener('orientationchange', resizeCanvas);

    // --- DESENHO DAS FLORES (GIRASSÓIS) ---
    function drawFlower(x, y, size, opacity = 1) {
        ctx.save();
        ctx.globalAlpha = opacity;
        
        // Pétalas (mais densas e preenchidas)
        ctx.fillStyle = '#FFD700';
        for (let i = 0; i < 12; i++) { // Mais pétalas por flor
            const angle = i * (Math.PI / 6);
            ctx.beginPath();
            ctx.ellipse(
                x + Math.cos(angle) * size * 0.8, 
                y + Math.sin(angle) * size * 0.8, 
                size * 1.8, size * 0.8, // Pétalas maiores e mais largas
                angle, 0, Math.PI * 2
            );
            ctx.fill();
        }
        
        // Miolo
        ctx.beginPath();
        ctx.arc(x, y, size * 1.1, 0, Math.PI * 2);
        ctx.fillStyle = '#4a2c11';
        ctx.fill();
        ctx.restore();
    }

    // --- LÓGICA DA ÁRVORE ---
    function drawTree(x, y, len, angle, branchWidth, depth) {
        const endX = x + len * Math.sin(angle * Math.PI / 180);
        const endY = y - len * Math.cos(angle * Math.PI / 180);

        ctx.beginPath();
        ctx.strokeStyle = '#3d2b1f'; 
        ctx.lineWidth = branchWidth;
        ctx.lineCap = 'round';
        ctx.moveTo(x, y);
        ctx.lineTo(endX, endY);
        ctx.stroke();

        // Limita a árvore a 6 níveis de profundidade
        if (depth < 6) {
            setTimeout(() => {
                drawTree(endX, endY, len * 0.75, angle - 22, branchWidth * 0.7, depth + 1);
                drawTree(endX, endY, len * 0.75, angle + 22, branchWidth * 0.7, depth + 1);
                
                if (depth > 2 && Math.random() > 0.3) {
                    drawTree(endX, endY, len * 0.6, angle + (Math.random() * 10 - 5), branchWidth * 0.6, depth + 1);
                }
            }, 80);
        }
    }

    // --- LÓGICA DO CORAÇÃO ULTRA DENSO ---
    function getHeartPoint(t, scale) {
        const hX = 16 * Math.pow(Math.sin(t), 3);
        const hY = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        return { x: hX * scale, y: hY * scale };
    }

    function popHeartFlowers() {
        const originX = canvas.width / 2;
        const originY = canvas.height * 0.4; // Ajustado para o centro do novo canvas
        const scale = canvas.width > 768 ? 11 : 9; // Ligeiramente maior

        // --- CAMADA 1: MÁSCARA BASE Densa (Cobre os Ramos) ---
        // Desenha centenas de flores opacas muito rapidamente
        for (let i = 0; i < 350; i++) {
            setTimeout(() => {
                const randomT = Math.random() * Math.PI * 2;
                // Raiz quadrada do Math.random garante preenchimento denso no centro
                const randomScale = Math.sqrt(Math.random()) * scale * 1.1; // Ligeiramente maior que o contorno
                const pt = getHeartPoint(randomT, randomScale);
                
                // Flores da base (maiores e mais simples para preencher fundo)
                ctx.beginPath();
                ctx.arc(originX + pt.x, originY + pt.y, 6 + Math.random() * 4, 0, Math.PI * 2);
                ctx.fillStyle = Math.random() > 0.2 ? '#FFD700' : '#4a2c11';
                ctx.fill();
            }, i * 2); // Preenchimento quase instantâneo
        }

        // --- CAMADA 2: DETALHES SUPERFICIAIS (Aparência de Girassol) ---
        setTimeout(() => {
            // Contorno do coração
            let t = 0;
            const drawOutline = setInterval(() => {
                if (t > Math.PI * 2) {
                    clearInterval(drawOutline);
                    return;
                }
                const pt = getHeartPoint(t, scale);
                // Flores de contorno menores e detalhadas
                drawFlower(originX + pt.x, originY + pt.y, 3);
                t += 0.1;
            }, 25);

            // Preenchimento de superfície detalhado
            for (let i = 0; i < 150; i++) { // 150 flores detalhadas em cima da base
                setTimeout(() => {
                    const randomT = Math.random() * Math.PI * 2;
                    const randomScale = Math.sqrt(Math.random()) * scale; 
                    const pt = getHeartPoint(randomT, randomScale);
                    // Flores detalhadas de tamanhos variados
                    drawFlower(originX + pt.x, originY + pt.y, 3 + Math.random() * 3);
                }, i * 20); // Aparecem aos poucos para efeito visual
            }
        }, 500); // Começa meio segundo após a base denso
    }

    // --- SEQUÊNCIA DA ANIMAÇÃO NO CANVAS ---
    // Aguarda carregar e calcular o layout do container
    window.onload = () => {
        setTimeout(() => {
            const startX = canvas.width / 2;
            const startY = canvas.height - 40; // Base do canvas, acima do timer
            const initialLength = canvas.height * 0.15; // Árvore maior proporcionalmente
            
            // 1. Cresce a Árvore
            drawTree(startX, startY, initialLength, 0, 16, 0);

            // 2. Espera a árvore crescer e explode o coração ultra-denso
            setTimeout(popHeartFlowers, 1200);

        }, 200);
    };
</script>
</body>
</html>
