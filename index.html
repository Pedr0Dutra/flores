<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flores para você 🌻</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FAF3E0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; /* Evita que a tela role e quebre o canvas */
            height: 100vh;
            color: #4A3B32;
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .text-container {
            position: absolute;
            top: 6%;
            left: 5%;
            z-index: 2;
            width: 90%;
            max-width: 400px;
            font-size: 1.1rem;
            line-height: 1.5;
            text-shadow: 2px 2px 5px rgba(250, 243, 224, 0.9);
        }
        .timer-container {
            position: absolute;
            bottom: 4%;
            left: 5%;
            z-index: 2;
            width: 90%;
            font-size: 0.9rem;
            background: rgba(250, 243, 224, 0.95);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-sizing: border-box;
            border: 2px solid #4A3B32;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.1);
        }
        #timer {
            margin: 8px 0 0 0;
            font-weight: bold;
            font-size: 0.95rem;
        }
        .typewriter {
            min-height: 24px;
            margin-bottom: 12px;
        }
        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.2em;
            background-color: #4A3B32;
            animation: blink 1s step-end infinite;
            vertical-align: bottom;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="text-container" id="text-container"></div>

<div class="timer-container">
    <strong>Meu amor por você começou há...</strong>
    <p id="timer">0 dias 0 horas 0 minutos 0 segundos</p>
</div>

<canvas id="canvas"></canvas>

<script>
    // --- TEXTOS E DATA ---
    const phrases = [
        "Flores Amarelas para o amor da minha vida:",
        "Se eu pudesse escolher um lugar seguro, seria ao seu lado.",
        "Quanto mais tempo passa, vejo que meu amor por você só cresce.",
        "- Eu te amo! 🌻"
    ];
    
    // Data: 31 de Agosto de 2025
    const startDate = new Date(2025, 7, 31, 0, 0, 0); 

    // --- MÁQUINA DE ESCREVER ---
    const textContainer = document.getElementById('text-container');
    let phraseIndex = 0;
    let charIndex = 0;
    
    function typeWriter() {
        if (phraseIndex < phrases.length) {
            if (charIndex === 0) {
                const p = document.createElement('div');
                p.className = 'typewriter';
                p.id = `phrase-${phraseIndex}`;
                textContainer.appendChild(p);
            }
            const currentElement = document.getElementById(`phrase-${phraseIndex}`);
            if (charIndex < phrases[phraseIndex].length) {
                currentElement.innerHTML = phrases[phraseIndex].substring(0, charIndex + 1) + '<span class="cursor"></span>';
                charIndex++;
                setTimeout(typeWriter, 50); 
            } else {
                currentElement.innerHTML = phrases[phraseIndex];
                phraseIndex++;
                charIndex = 0;
                setTimeout(typeWriter, 1200); 
            }
        } else {
            const p = document.getElementById(`phrase-${phraseIndex - 1}`);
            if(p) p.innerHTML += '<span class="cursor"></span>';
        }
    }
    setTimeout(typeWriter, 800);

    // --- CONTADOR DE TEMPO ---
    function updateTimer() {
        const now = new Date();
        const diff = now - startDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / 1000 / 60) % 60);
        const seconds = Math.floor((diff / 1000) % 60);
        document.getElementById('timer').innerText = `${days} dias ${hours} horas ${minutes} minutos ${seconds} segundos`;
    }
    setInterval(updateTimer, 1000);
    updateTimer();

    // --- SETUP DO CANVAS (Fixado para não apagar no iPhone) ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    // Trava o tamanho exato da tela ao carregar
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // --- DESENHO DAS FLORES (GIRASSÓIS) ---
    function drawFlower(x, y, size) {
        // Pétalas
        ctx.fillStyle = '#FFD700';
        for (let i = 0; i < 8; i++) {
            const angle = i * (Math.PI / 4);
            ctx.beginPath();
            // Desenha a pétala ovalada apontando para fora
            ctx.ellipse(
                x + Math.cos(angle) * size * 1.2, 
                y + Math.sin(angle) * size * 1.2, 
                size * 1.5, size * 0.7, 
                angle, 0, Math.PI * 2
            );
            ctx.fill();
        }
        // Miolo
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fillStyle = '#4a2c11';
        ctx.fill();
    }

    // --- LÓGICA DA ÁRVORE (Trigonometria Absoluta = Zero Bugs) ---
    function drawTree(x, y, len, angle, branchWidth, depth) {
        // Calcula onde a ponta do galho vai parar exatamente
        const endX = x + len * Math.sin(angle * Math.PI / 180);
        const endY = y - len * Math.cos(angle * Math.PI / 180);

        ctx.beginPath();
        ctx.strokeStyle = '#3d2b1f'; // Cor do tronco
        ctx.lineWidth = branchWidth;
        ctx.lineCap = 'round';
        ctx.moveTo(x, y);
        ctx.lineTo(endX, endY);
        ctx.stroke();

        // Limita a árvore a 6 "níveis" de galhos
        if (depth < 6) {
            setTimeout(() => {
                // Bifurcação em V (Direita e Esquerda)
                drawTree(endX, endY, len * 0.75, angle - 22, branchWidth * 0.7, depth + 1);
                drawTree(endX, endY, len * 0.75, angle + 22, branchWidth * 0.7, depth + 1);
                
                // Um galho menor no meio para dar volume
                if (depth > 2 && Math.random() > 0.3) {
                    drawTree(endX, endY, len * 0.6, angle + (Math.random() * 10 - 5), branchWidth * 0.6, depth + 1);
                }
            }, 80); // Velocidade de crescimento dos galhos
        }
    }

    // --- LÓGICA DO CORAÇÃO DE GIRASSÓIS ---
    // Equação Matemática de um Coração Perfeito
    function getHeartPoint(t, scale) {
        const hX = 16 * Math.pow(Math.sin(t), 3);
        const hY = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        return { x: hX * scale, y: hY * scale };
    }

    function popHeartFlowers() {
        const originX = canvas.width / 2;
        // Posiciona o coração no topo dos galhos
        const originY = canvas.height * 0.45; 
        const scale = canvas.width > 768 ? 10 : 8.5; // Tamanho do coração

        let t = 0;
        // 1. Desenha o contorno do coração girando
        const drawOutline = setInterval(() => {
            if (t > Math.PI * 2) {
                clearInterval(drawOutline);
                fillHeart(); // Quando fechar o contorno, preenche o meio
                return;
            }
            const pt = getHeartPoint(t, scale);
            drawFlower(originX + pt.x, originY + pt.y, 4);
            t += 0.12; // Velocidade do contorno
        }, 30);

        // 2. Explode dezenas de flores para preencher o centro do coração
        function fillHeart() {
            for (let i = 0; i < 180; i++) {
                setTimeout(() => {
                    const randomT = Math.random() * Math.PI * 2;
                    // Raiz quadrada do Math.random garante que espalhe bem pelo centro
                    const randomScale = Math.sqrt(Math.random()) * scale; 
                    const pt = getHeartPoint(randomT, randomScale);
                    drawFlower(originX + pt.x, originY + pt.y, 3.5 + Math.random() * 2);
                }, i * 15); // Tempo para cada flor aparecer
            }
        }
    }

    // --- SEQUÊNCIA DA ANIMAÇÃO ---
    setTimeout(() => {
        // Posição inicial da árvore (Meio da tela na base)
        const startX = canvas.width / 2;
        const startY = canvas.height - (canvas.height * 0.15);
        const initialLength = canvas.height * 0.12;
        
        // 1. Cresce a Árvore
        drawTree(startX, startY, initialLength, 0, 14, 0);

        // 2. Espera a árvore crescer (aprox. 1.2 segundos) e explode o coração
        setTimeout(popHeartFlowers, 1200);

    }, 500);

</script>
</body>
</html>
