<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores para ti 🌻</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FAF3E0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #4A3B32;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .text-container {
            position: absolute;
            top: 10%;
            left: 5%;
            z-index: 2;
            width: 90%;
            max-width: 450px;
            font-size: 1.1rem;
            line-height: 1.4;
        }
        @media (min-width: 768px) {
            .text-container { font-size: 1.3rem; top: 15%; left: 8%; }
        }
        .timer-container {
            position: absolute;
            bottom: 8%;
            left: 5%;
            z-index: 2;
            font-size: 0.9rem;
            background: rgba(250, 243, 224, 0.8);
            padding: 12px;
            border-radius: 10px;
            border-bottom: 3px solid #4A3B32;
        }
        .typewriter {
            min-height: 24px;
            margin-bottom: 12px;
        }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: #4A3B32;
            animation: blink 1s step-end infinite;
            vertical-align: bottom;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="container">
    <div class="text-container" id="text-container"></div>
    
    <div class="timer-container">
        <strong>Meu amor por você começou há...</strong>
        <p id="timer">0 dias 0 horas 0 minutos 0 segundos</p>
    </div>

    <canvas id="canvas"></canvas>
</div>

<script>
    // --- CONFIGURAÇÕES ---
    const phrases = [
        "Flores Amarelas para o amor da minha vida:",
        "Se eu pudesse escolher um lugar seguro, seria ao seu lado.",
        "Quanto mais tempo passa, vejo que meu amor por você só cresce.",
        "- Eu te amo! 🌻"
    ];
    
    // Data: 31 de Agosto de 2025 (Agosto é mês 7 no JS)
    const startDate = new Date(2025, 7, 31, 0, 0, 0); 

    // --- MÁQUINA DE ESCREVER ---
    const textContainer = document.getElementById('text-container');
    let phraseIndex = 0;
    let charIndex = 0;
    
    function typeWriter() {
        if (phraseIndex < phrases.length) {
            if (charIndex === 0) {
                const p = document.createElement('div');
                p.className = 'typewriter';
                p.id = `phrase-${phraseIndex}`;
                textContainer.appendChild(p);
            }
            const currentElement = document.getElementById(`phrase-${phraseIndex}`);
            if (charIndex < phrases[phraseIndex].length) {
                currentElement.innerHTML = phrases[phraseIndex].substring(0, charIndex + 1) + '<span class="cursor"></span>';
                charIndex++;
                setTimeout(typeWriter, 50); 
            } else {
                currentElement.innerHTML = phrases[phraseIndex];
                phraseIndex++;
                charIndex = 0;
                setTimeout(typeWriter, 1000); 
            }
        }
    }
    setTimeout(typeWriter, 1000);

    // --- CRONÓMETRO ---
    function updateTimer() {
        const now = new Date();
        const diff = now - startDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / 1000 / 60) % 60);
        const seconds = Math.floor((diff / 1000) % 60);
        document.getElementById('timer').innerText = `${days} dias ${hours} horas ${minutes} minutos ${seconds} segundos`;
    }
    setInterval(updateTimer, 1000);
    updateTimer();

    // --- ANIMAÇÃO DA ÁRVORE DE CORAÇÃO ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    function drawSunflower(x, y, size) {
        // Miolo
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fillStyle = '#63391d';
        ctx.fill();
        
        // Pétalas
        const petalCount = 10;
        for (let i = 0; i < petalCount; i++) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate((i * Math.PI * 2) / petalCount);
            ctx.beginPath();
            ctx.ellipse(size * 1.5, 0, size * 1.2, size * 0.5, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#FFD700';
            ctx.fill();
            ctx.restore();
        }
    }

    // Equação do Coração para os Girassóis
    function getHeartPoint(t, scale) {
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        return { x: x * scale, y: y * scale };
    }

    function animateTree() {
        const centerX = width * 0.65;
        const bottomY = height * 0.8;
        const trunkHeight = height * 0.25;
        const heartScale = width > 768 ? 10 : 7;
        
        // 1. Desenhar o tronco principal
        let currentHeight = 0;
        const drawTrunk = () => {
            if (currentHeight < trunkHeight) {
                ctx.beginPath();
                ctx.strokeStyle = '#4A3B32';
                ctx.lineWidth = 12;
                ctx.lineCap = 'round';
                ctx.moveTo(centerX, bottomY);
                ctx.lineTo(centerX, bottomY - currentHeight);
                ctx.stroke();
                currentHeight += 4;
                requestAnimationFrame(drawTrunk);
            } else {
                drawBranches();
            }
        };

        // 2. Desenhar os ramos que sobem para o coração
        const drawBranches = () => {
            let step = 0;
            const drawStep = () => {
                if (step < 20) {
                    ctx.beginPath();
                    ctx.lineWidth = 8 - (step * 0.3);
                    ctx.moveTo(centerX, bottomY - trunkHeight);
                    // Criar ramificações leves para a base do coração
                    ctx.lineTo(centerX + (step * 2), bottomY - trunkHeight - (step * 3));
                    ctx.lineTo(centerX - (step * 2), bottomY - trunkHeight - (step * 3));
                    ctx.stroke();
                    step++;
                    setTimeout(drawStep, 30);
                } else {
                    popFlowers();
                }
            };
            drawStep();
        };

        // 3. Fazer os Girassóis aparecerem em formato de coração
        const popFlowers = () => {
            let t = 0;
            const flowerInterval = setInterval(() => {
                if (t <= Math.PI * 2) {
                    const point = getHeartPoint(t, heartScale);
                    // Ajustar posição para o topo do tronco
                    const x = centerX + point.x;
                    const y = (bottomY - trunkHeight - 40) + point.y;
                    
                    drawSunflower(x, y, 4 + Math.random() * 3);
                    t += 0.15; // Velocidade de preenchimento
                } else {
                    clearInterval(flowerInterval);
                    // Preenchimento extra no meio do coração
                    for(let i=0; i<30; i++) {
                        setTimeout(() => {
                            const r = Math.random() * heartScale;
                            const angle = Math.random() * Math.PI * 2;
                            const p = getHeartPoint(angle, r);
                            drawSunflower(centerX + p.x, (bottomY - trunkHeight - 40) + p.y, 3);
                        }, i * 50);
                    }
                }
            }, 50);
        };

        drawTrunk();
    }

    setTimeout(animateTree, 1500);
</script>
</body>
</html>
